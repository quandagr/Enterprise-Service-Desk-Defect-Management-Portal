<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Service Desk & Defect Management Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-[#f3d4f7]">
    <header>
        <!--This is the header for the section-->
        <h1 class="text-transform:uppercase-bold">Enterprise Service Desk & Defect Management Portal</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Tickets</a></li>
            <li><a href="#">Defects</a></li>
            <li><a href="#">Reports</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2 class="text-gradient-purple-teal-white-gray-bold shadow-xl/50 ">Welcome to the Enterprise Service Desk</h2>
            <p>
                Manage incidents, service requests, and software defects from one centralized platform.
            </p>
            <!--Created a button to submit a ticket-->
            <button class="bg-violet-600 hover:bg-violet-800 text-teal-50 font-bold px-4 py-2 m-8
             rounded ring-4 pd-7">
                Create a Ticket
            </button>
        </section>
    </main>
</body>
</html>
