<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Service Desk & Defect Management Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
        }
        @keyframes fade-in-down {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
            animation: fade-in-down 1s ease-out;
        }
    </style>

</head>
<body class="bg-gradient-to-r from-teal-50 to-purple-50 min-h-screen">
    <header class="bg-gradient-to-r from-purple-700 via-teal-500 to-gray-700 animate-gradient shadow-xl shadow-purple-500/30 inset-shadow-sm inset-shadow-white/20 p-6 rounded-b-lg">
        <!--This is the header for the section-->
        <h1 class="text-3xl font-bold text-white uppercase tracking-wide text-center drop-shadow-md animate-fade-in-down">Enterprise Service Desk & Defect Management Portal</h1>
    </header>

    <nav class="bg-gradient-to-r from-white via-teal-500 to-purple-700 shadow-md">
        <ul class="flex justify-center gap-8 p-4">
            <li><a href="#" class="text-teal-700 font-semibold hover:text-white transition">Dashboard</a></li>
            <li><a href="#" class="text-teal-700 font-semibold hover:text-white transition">Tickets</a></li>
            <li><a href="#" class="text-teal-700 font-semibold hover:text-white transition">Defects</a></li>
            <li><a href="#" class="text-teal-700 font-semibold hover:text-white transition">Reports</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2 class="m-8 bg-gradient-to-r from-purple-700 to-white text-white text-2xl font-semibold border-2 border-teal-500 shadow-lg shadow-teal-500/50 p-4 rounded">Welcome to the Enterprise Service Desk</h2>
            <p class="text-purple-300 font-sans text-center">
                Manage incidents, service requests, and software defects from one centralized platform.
            </p>
            <!--Created a button to submit a ticket-->
            <button class="bg-violet-600 hover:bg-violet-800 text-teal-50 font-bold px-4 py-2 m-8
             rounded ring-4 pd-7">
                Create a Ticket
            </button>
        </section>
    </main>
</body>
</html>
